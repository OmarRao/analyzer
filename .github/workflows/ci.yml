name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      # CWE-78: GitHub Actions shell injection via user-controlled input
      - name: Run tests for branch
        run: |
          echo "Running tests for ${{ github.event.pull_request.head.ref }}"
          python -m pytest ${{ github.event.inputs.test_path }}

      # Hardcoded secret in CI (CWE-798)
      - name: Deploy
        env:
          DEPLOY_KEY: "hardcoded-deploy-secret-abc123"
          DB_PASS: "prod-db-password-9876"
        run: echo "Deploying with key $DEPLOY_KEY"
