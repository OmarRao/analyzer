version: '3.8'
services:
  vulnbank:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - DATABASE_URL=sqlite:///vulnbank.db
    volumes:
      - ./:/app
      - uploads:/app/uploads
    networks:
      - vulnbank-net

  mailhog:
    image: mailhog/mailhog
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - vulnbank-net

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      # CWE-521: No authentication required — default MongoDB with no root password
      - MONGO_INITDB_DATABASE=vulnbank
    volumes:
      - mongodata:/data/db
    networks:
      - vulnbank-net

  vulnbank-node:
    build:
      context: ./microservice
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    networks:
      - vulnbank-net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - vulnbank
    networks:
      - vulnbank-net

volumes:
  uploads:
  mongodata:

networks:
  vulnbank-net:
