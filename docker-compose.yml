version: '3.8'
services:
  vulnbank:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - DATABASE_URL=sqlite:///vulnbank.db
    volumes:
      - ./:/app
      - uploads:/app/uploads
    networks:
      - vulnbank-net

  mailhog:
    image: mailhog/mailhog
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - vulnbank-net

volumes:
  uploads:

networks:
  vulnbank-net:
