events {}
http {
  upstream vulnbank {
    server vulnbank:5000;
    keepalive 32;
  }
  server {
    listen 80;
    location / {
      proxy_pass http://vulnbank;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      # VULN CWE-444: Does not normalize conflicting Transfer-Encoding and Content-Length headers
    }
  }
}
